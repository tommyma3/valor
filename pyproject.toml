[project]
name = "valor"
version = "0.1.0"
description = "Value-guided context management for agent learning"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31.0",
    "torch==2.9.1",
    "transformers>=4.40.0",
    "tqdm",
    "huggingface-hub>=1.7.1",
    "accelerate>=1.13.0",
    "safetensors>=0.7.0",
    "sglang>=0.5.2",
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cu130", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
